<!DOCTYPE html> <!-- HTML5 标准 -->
<html>
<!-- head，网页的头部信息 
<meta charset="UTF-8">  设置字符编码为 UTF-8
<link rel="stylesheet" href="style.css"> 引入样式表文件
-->
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<!-- body 网页的身体（用户能看见的内容）
 <div id="root"></div> 一个空的容器盒子，标记为 root，待会儿要往这个盒子里放家具
 <script src="app.js"></script> 引入 JavaScript 脚本,让它往 root 圈里搬家具
 -->
<body>
  <div id="root"></div>
  <script src="app.js"></script>
</body>
</html>
